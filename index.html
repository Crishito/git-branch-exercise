<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Proyecto Git</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        /* HEADER */
        header {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 15px 0;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffd700;
        }

        /* CONTENIDO */
        .contenedor {
            margin-top: 100px;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #ffffff;
            color: #333;
            font-size: 1em;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #333;
            color: white;
        }
    </style>
</head>

<body>

    <!-- HEADER CON MENÚ -->
    <header>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Sobre mí</a>
            <a href="#">Proyectos</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <!-- CONTENIDO -->
    <div class="contenedor">
        <h1>🚀 Bienvenido a mi sitio web</h1>
        <p>Este es mi proyecto usando Git y GitHub</p>

        <button onclick="alert('¡Gracias por visitar!')">
            Haz clic aquí
        </button>
    </div>

</body>
</html>
